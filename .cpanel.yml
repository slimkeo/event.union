---
deployment:
  tasks:
    - export DEPLOYPATH=/home/snatuni1/events.snatunion.com

    # Clean previous deployment (safe way)
    - rm -rf $DEPLOYPATH/*

    # Copy all PHP files from root
    - /bin/cp -R *.php $DEPLOYPATH/ 2>/dev/null || true

    # Copy folders only if they exist (this prevents the error)
    - /bin/cp -R config $DEPLOYPATH/ 2>/dev/null || true
    - /bin/cp -R assets $DEPLOYPATH/ 2>/dev/null || true

    # Set correct permissions
    - find $DEPLOYPATH -type f -name "*.php" -exec chmod 644 {} \; 2>/dev/null || true
    - find $DEPLOYPATH -type d -exec chmod 755 {} \; 2>/dev/null || true

    - echo "✅ Events Authenticator deployed successfully at $(date)"